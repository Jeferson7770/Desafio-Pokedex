version: '3.8'

services:
  web:
    build: .
    container_name: fince_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgres://neondb_owner:postgres@db:5432/neondb
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: fince_postgres
    environment:
      - POSTGRES_USER=neondb_owner
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=neondb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neondb_owner -d neondb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: